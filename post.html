<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahmudul Haque | Personal Log</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="selection:bg-cyan-500 selection:text-black">

    <div class="scanlines"></div>
    <div class="holo-grid"></div>
    <div class="custom-cursor" id="cursor"></div>
    <div class="custom-cursor-dot" id="cursor-dot"></div>

    <canvas id="bg-canvas"></canvas>

    <!-- Mobile-Responsive Futuristic Top Nav -->
    <header class="fixed top-0 left-0 w-full z-50 border-b border-cyan-500/20 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex justify-between items-center w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 bg-cyan-400 animate-ping rounded-full"></div>
                    <span class="hud-title text-cyan-400 font-bold tracking-widest text-sm scramble" data-value="CORE::READING">CORE::READING</span>
                </div>
                <!-- Audio Toggle visible on mobile right side -->
                <button onclick="toggleAudio()" class="md:hidden px-3 py-1.5 border border-cyan-500/40 bg-cyan-950/20 text-[10px] text-cyan-400 rounded flex items-center gap-2 transition-all">
                    <i id="audio-icon-mobile" class="fas fa-volume-mute"></i> SFX OFF
                </button>
            </div>
            
            <nav class="flex items-center gap-5 text-[11px] md:text-xs font-mono overflow-x-auto whitespace-nowrap w-full md:w-auto pb-1 md:pb-0 scrollbar-hide">
                <a href="index.html#blog" class="hover:text-cyan-400 transition-all cursor-none"><i class="fas fa-arrow-left"></i> [RETURN_TO_INDEX]</a>
            </nav>

            <!-- Desktop Audio Toggle -->
            <button onclick="toggleAudio()" class="hidden md:flex px-4 py-2 border border-cyan-500/40 bg-cyan-950/20 text-xs text-cyan-400 rounded items-center gap-2 cursor-none hover:border-cyan-400 transition-all">
                <i id="audio-icon" class="fas fa-volume-mute"></i> <span id="audio-status">UI_SFX OFF</span>
            </button>
        </div>
    </header>

    <main class="relative pt-24 md:pt-32 pb-24 px-4 md:px-6 flex items-center justify-center min-h-screen">
        <section class="max-w-4xl w-full cyber-panel p-8 md:p-12 anim-text-fly" id="single-post-container">
            <div class="text-center text-cyan-400 animate-pulse">
                DECRYPTING LOG_DATA...
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
